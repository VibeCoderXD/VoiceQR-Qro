<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#fdfcf8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Qro — Voice Player</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fdfcf8;
  --surface: #ffffff;
  --surface2: #f4f3ee;
  --surface3: #e9e8e0;
  --accent: #b08d4b;
  --accent2: #d4b882;
  --text: #1c1c1e;
  --muted: #8e8e93;
  --muted2: #636366;
  --danger: #ff3b30;
  --radius: 24px;
  --radius-sm: 14px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
  padding: 32px 18px 48px;
}

.ambient { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.13; }
.orb-1 { width: 420px; height: 420px; background: var(--accent2); top: -120px; right: -120px; }
.orb-2 { width: 320px; height: 320px; background: #c8d9f0; bottom: 80px; left: -100px; }
.grain {
  position: fixed; inset: 0; opacity: 0.035; pointer-events: none; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

.wrap {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  position: relative;
  z-index: 1;
}

/* ── Logo ── */
.logo-area { text-align: center; }
.logo {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  text-decoration: none;
  display: block;
  margin-bottom: 4px;
  letter-spacing: -0.3px;
}
.logo-tag {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1.8px;
  text-transform: uppercase;
  font-weight: 400;
}

/* ── Card ── */
.card {
  width: 100%;
  background: var(--surface);
  border-radius: var(--radius);
  padding: 28px 24px 24px;
  border: 1px solid rgba(0,0,0,0.04);
  box-shadow: 0 12px 40px rgba(0,0,0,0.06), 0 2px 8px rgba(0,0,0,0.03);
  animation: rise 0.5s cubic-bezier(0.22,1,0.36,1);
}
@keyframes rise {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  background: rgba(176,141,75,0.1);
  border-radius: 50px;
  font-size: 10px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.rec-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  line-height: 1.3;
  color: var(--text);
  margin-bottom: 24px;
  word-break: break-word;
}

/* ── Waveform ── */
.waveform {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  height: 54px;
  margin-bottom: 16px;
}
.bar {
  width: 3px;
  border-radius: 3px;
  background: var(--accent);
  transition: height 0.09s ease;
  animation: breathe 2.8s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { opacity: 0.2; }
  50%       { opacity: 0.35; }
}
.bar.lit { animation: none; opacity: 0.88; }

.sep { height: 1px; background: var(--surface3); margin-bottom: 20px; }

/* ── Controls ── */
.controls { display: flex; align-items: center; gap: 16px; }

.play-wrap {
  position: relative;
  width: 64px; height: 64px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.pulse-ring {
  position: absolute;
  border-radius: 50%;
  border: 1.5px solid rgba(176,141,75,0.4);
  opacity: 0;
  pointer-events: none;
}
.pulse-ring-1 { width: 80px; height: 80px; }
.pulse-ring-2 { width: 96px; height: 96px; }
.pulse-ring.go { animation: ringOut 2s ease-out infinite; }
.pulse-ring-2.go { animation-delay: 0.5s; }
@keyframes ringOut {
  0%   { transform: scale(0.86); opacity: 0.55; }
  100% { transform: scale(1.08); opacity: 0; }
}

.play-btn {
  width: 64px; height: 64px;
  border-radius: 50%; border: none;
  background: linear-gradient(145deg, var(--accent), var(--accent2));
  box-shadow: 0 6px 22px rgba(176,141,75,0.38), inset 0 1px 0 rgba(255,255,255,0.22);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: transform 0.18s, box-shadow 0.18s, opacity 0.2s;
  position: relative; z-index: 1;
}
.play-btn:active { transform: scale(0.91); box-shadow: 0 3px 10px rgba(176,141,75,0.25); }
.play-btn.loading { opacity: 0.42; pointer-events: none; }
.play-btn svg { width: 26px; height: 26px; fill: #fff; }

.prog-area { flex: 1; display: flex; flex-direction: column; gap: 8px; }
.prog-track {
  height: 5px; border-radius: 10px;
  background: var(--surface3);
  cursor: pointer; position: relative; overflow: hidden;
}
.prog-fill {
  position: absolute; top: 0; left: 0;
  height: 100%; border-radius: 10px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  width: 0%; transition: width 0.1s linear;
}
.time-row {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--muted); font-weight: 500;
}

/* ── Download ── */
.dl-btn {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; width: 100%; margin-top: 20px;
  padding: 12px 16px; border-radius: var(--radius-sm);
  border: 1px solid rgba(176,141,75,0.16);
  background: rgba(176,141,75,0.04);
  color: var(--muted2); font-family: inherit;
  font-size: 12px; font-weight: 500;
  text-decoration: none; cursor: pointer;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
}
.dl-btn:hover { background: rgba(176,141,75,0.09); color: var(--accent); border-color: rgba(176,141,75,0.28); }

/* ── Loading state ── */
.st-loading {
  display: flex; flex-direction: column;
  align-items: center; gap: 12px; padding: 14px 0 6px;
}
.spinner {
  width: 22px; height: 22px;
  border: 2px solid rgba(176,141,75,0.18);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.st-loading p { font-size: 13px; color: var(--muted); font-weight: 300; }

/* ── Error state ── */
.st-error { display: none; text-align: center; padding: 12px 0 4px; }
.st-error .err-icon { font-size: 30px; margin-bottom: 10px; }
.st-error .err-msg { font-size: 13px; color: var(--danger); line-height: 1.6; font-weight: 300; }

/* ── Footer CTA ── */
.cta-area { text-align: center; }
.cta-hint { font-size: 12px; color: var(--muted); font-weight: 300; margin-bottom: 12px; }
.cta-btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 13px 26px; border-radius: 50px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #0a0a0f; font-family: inherit; font-size: 13px; font-weight: 600;
  text-decoration: none;
  box-shadow: 0 5px 18px rgba(176,141,75,0.28);
  transition: transform 0.18s, box-shadow 0.18s;
}
.cta-btn:active { transform: scale(0.95); box-shadow: 0 2px 8px rgba(176,141,75,0.2); }
</style>
</head>
<body>

<div class="ambient">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>
<div class="grain"></div>

<div class="wrap">

  <div class="logo-area">
    <a href="/" class="logo">Qro</a>
    <div class="logo-tag">Record · Upload · Share</div>
  </div>

  <div class="card">
    <div class="badge">🎙 Voice Recording</div>
    <div class="rec-title" id="rec-title">Loading…</div>

    <div class="st-loading" id="st-loading">
      <div class="spinner"></div>
      <p>Preparing audio…</p>
    </div>

    <div id="st-player" style="display:none">
      <div class="waveform" id="waveform"></div>
      <div class="sep"></div>
      <div class="controls">
        <div class="play-wrap">
          <div class="pulse-ring pulse-ring-1" id="ring1"></div>
          <div class="pulse-ring pulse-ring-2" id="ring2"></div>
          <button class="play-btn loading" id="play-btn" onclick="togglePlay()">
            <svg id="ico-play"  viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="ico-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
        </div>
        <div class="prog-area">
          <div class="prog-track" id="prog-track" onclick="seek(event)">
            <div class="prog-fill" id="prog-fill"></div>
          </div>
          <div class="time-row">
            <span id="t-curr">0:00</span>
            <span id="t-total">–:––</span>
          </div>
        </div>
      </div>
      <a id="dl-btn" class="dl-btn" target="_blank" rel="noopener">⬇ Download Audio</a>
    </div>

    <div class="st-error" id="st-error">
      <div class="err-icon">⚠️</div>
      <div class="err-msg" id="err-msg">This recording could not be loaded.</div>
    </div>
  </div>

  <div class="cta-area">
    <p class="cta-hint">Create your own shareable voice QR in seconds</p>
    <a href="/" class="cta-btn">🎙 Try Qro Free</a>
  </div>

</div>

<audio id="audio" crossorigin="anonymous" preload="metadata"></audio>

<script>
const params   = new URLSearchParams(location.search);
const src      = params.get('src')   || '';
const rawTitle = params.get('title') || 'Voice Recording';

document.title = rawTitle + ' — Qro';
document.getElementById('rec-title').textContent = rawTitle;

const audio  = document.getElementById('audio');
const wfEl   = document.getElementById('waveform');
let playing  = false;
let audioCtx, analyser, mediaSource, animId;
let ready    = false;

// Build waveform bars with a sinusoidal idle pattern
const BAR_N = 38;
const idleH = [];
for (let i = 0; i < BAR_N; i++) {
  const b = document.createElement('div');
  b.className = 'bar';
  const h = 6 + Math.round(Math.sin(i * 0.42) * 10 + Math.cos(i * 0.85) * 7 + 16);
  b.style.height = h + 'px';
  b.style.animationDelay = (i * 0.04) + 's';
  idleH.push(h);
  wfEl.appendChild(b);
}
const bars = Array.from(wfEl.children);

if (!src) {
  showErr('No audio source was provided in this link.');
} else {
  audio.src = src;
  document.getElementById('dl-btn').href = src;
}

audio.onloadedmetadata = () => {
  ready = true;
  document.getElementById('t-total').textContent = fmt(Math.round(audio.duration));
  document.getElementById('st-loading').style.display = 'none';
  document.getElementById('st-player').style.display  = 'block';
  document.getElementById('play-btn').classList.remove('loading');
  document.getElementById('ring1').classList.add('go');
  document.getElementById('ring2').classList.add('go');
};

audio.ontimeupdate = () => {
  if (!audio.duration) return;
  document.getElementById('prog-fill').style.width =
    (audio.currentTime / audio.duration * 100) + '%';
  document.getElementById('t-curr').textContent = fmt(Math.round(audio.currentTime));
};

audio.onended = () => {
  playing = false;
  cancelAnimationFrame(animId);
  updateIcon();
  restoreIdle();
  document.getElementById('ring1').classList.add('go');
  document.getElementById('ring2').classList.add('go');
};

audio.onerror = () => {
  showErr('This recording could not be loaded. The link may be invalid or the file has been removed.');
};

function togglePlay() {
  if (!ready) return;
  if (!audioCtx) initCtx();
  (audioCtx ? audioCtx.resume() : Promise.resolve()).then(() => {
    if (audio.paused) {
      audio.play().catch(() => showErr('Playback was blocked by the browser. Please tap again.'));
      playing = true;
      drawBars();
      document.getElementById('ring1').classList.remove('go');
      document.getElementById('ring2').classList.remove('go');
    } else {
      audio.pause();
      playing = false;
      cancelAnimationFrame(animId);
      restoreIdle();
      document.getElementById('ring1').classList.add('go');
      document.getElementById('ring2').classList.add('go');
    }
    updateIcon();
  });
}

function initCtx() {
  try {
    audioCtx    = new (window.AudioContext || window.webkitAudioContext)();
    analyser    = audioCtx.createAnalyser();
    analyser.fftSize = 128;
    mediaSource = audioCtx.createMediaElementSource(audio);
    mediaSource.connect(analyser);
    analyser.connect(audioCtx.destination);
  } catch (_) {
    audioCtx = null; // audio still plays, visualizer disabled
  }
}

function drawBars() {
  if (!playing) return;
  if (analyser) {
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    bars.forEach((b, i) => {
      const v = data[Math.floor(i * data.length / bars.length)] || 0;
      b.style.height = Math.max(5, (v / 255) * 48) + 'px';
      b.className = 'bar' + (v > 12 ? ' lit' : '');
    });
  }
  animId = requestAnimationFrame(drawBars);
}

function restoreIdle() {
  bars.forEach((b, i) => {
    b.style.height = idleH[i] + 'px';
    b.className = 'bar';
  });
}

function seek(e) {
  if (!audio.duration) return;
  const r = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
}

function updateIcon() {
  document.getElementById('ico-play').style.display  = playing ? 'none'  : 'block';
  document.getElementById('ico-pause').style.display = playing ? 'block' : 'none';
}

function showErr(msg) {
  document.getElementById('st-loading').style.display = 'none';
  document.getElementById('st-player').style.display  = 'none';
  document.getElementById('err-msg').textContent      = msg;
  document.getElementById('st-error').style.display   = 'block';
}

function fmt(s) {
  const n = isFinite(s) ? Math.max(0, s) : 0;
  return `${Math.floor(n / 60)}:${String(n % 60).padStart(2, '0')}`;
}
</script>
</body>
</html>
